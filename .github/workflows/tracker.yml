name: Ukraine Satellite OSINT

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure state file exists
        run: |
          if [ ! -f bot_state.json ]; then
            echo '{"schema_version":1,"processed_fires":[]}' > bot_state.json
          fi

      - name: Run OSINT Monitor
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          CDSE_CLIENT_ID: ${{ secrets.CDSE_CLIENT_ID }}
          CDSE_CLIENT_SECRET: ${{ secrets.CDSE_CLIENT_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python osint_monitor.py

      - name: Upload Fire Images
        uses: actions/upload-artifact@v4
        with:
          name: fire-images
          path: fire_images/*.png
          if-no-files-found: ignore

      - name: Upload Heatmaps
        uses: actions/upload-artifact@v4
        with:
          name: heatmaps
          path: heatmaps/*.png
          if-no-files-found: ignore

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet bot_state.json; then
            echo "No state changes"
          else
            git add bot_state.json
            git commit -m "Update fire state [skip ci]"
            git push
          fi
