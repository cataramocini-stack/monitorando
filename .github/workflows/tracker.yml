name: Ukraine Satellite OSINT
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão explícita para o bot commitar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests sentinelhub

      - name: Ensure state file exists
        run: |
          if [ ! -f bot_state.json ]; then echo '{"processed_fires": []}' > bot_state.json; fi

      - name: Run Monitor
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
          CDSE_CLIENT_ID: ${{ secrets.CDSE_CLIENT_ID }}
          CDSE_CLIENT_SECRET: ${{ secrets.CDSE_CLIENT_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python osint_monitor.py

      - name: Commit and Push State
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bot_state.json
          git commit -m "Update fire state [skip ci]" || exit 0
          git push
